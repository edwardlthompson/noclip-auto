name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test
        working-directory: noclip-analyze
      - name: Cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: noclip-analyze

  foss-audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: FOSS audit
        shell: pwsh
        run: ./scripts/foss-audit.ps1

  m0-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: M0 smoke
        shell: pwsh
        run: ./scripts/smoke/m0_smoke.ps1

  build-analyzer:
    runs-on: windows-latest
    needs: [rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build analyzer
        shell: pwsh
        run: ./scripts/build-analyzer.ps1 -Profile release-small
      - uses: actions/upload-artifact@v4
        with:
          name: noclip-analyze-win-x64
          path: NoClipAuto.lrdevplugin/bin/win-x64/noclip-analyze.exe

  m2-smoke:
    runs-on: windows-latest
    needs: [build-analyzer]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build analyzer
        shell: pwsh
        run: ./scripts/build-analyzer.ps1 -Profile release-small
      - name: M2 smoke
        shell: pwsh
        run: ./scripts/smoke/m2_smoke.ps1

  size-gate:
    runs-on: windows-latest
    needs: [build-analyzer]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build analyzer
        shell: pwsh
        run: ./scripts/build-analyzer.ps1 -Profile release-small
      - name: Size gate
        shell: pwsh
        run: |
          ./scripts/check-bundle-size.ps1
          ./scripts/check-lua-size.ps1 -ShippedOnly

  bench-gate:
    runs-on: windows-latest
    needs: [build-analyzer]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build bench analyzer
        shell: pwsh
        run: ./scripts/bench-analyzer.ps1

  build-analyzer-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare scripts
        run: chmod +x scripts/*.sh scripts/smoke/*.sh
      - name: Build macOS arm64
        run: ./scripts/build-analyzer-macos.sh release-small aarch64-apple-darwin
      - name: Generate fixtures
        run: ./scripts/generate-fixtures.sh
      - name: M7 smoke
        run: ./scripts/smoke/m7_smoke.sh
      - uses: actions/upload-artifact@v4
        with:
          name: noclip-analyze-macos-arm64
          path: NoClipAuto.lrdevplugin/bin/macos-arm64/noclip-analyze

  validate-bootstrap:
    name: Validate Bootstrap
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate bootstrap artifacts
        shell: pwsh
        run: ./scripts/validate-bootstrap.ps1 -Quick

  repo-hygiene:
    name: Repo Hygiene
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repo hygiene
        shell: pwsh
        run: ./scripts/check-repo-hygiene.ps1

  feature-gate:
    name: Feature Gate
    runs-on: windows-latest
    needs: [validate-bootstrap, repo-hygiene]
    steps:
      - uses: actions/checkout@v4
      - name: Feature gate (lightroom-rust CI profile)
        shell: pwsh
        run: ./scripts/feature-gate.ps1 -Stack lightroom-rust -Ci
