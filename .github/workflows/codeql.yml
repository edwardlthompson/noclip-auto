name: CodeQL

# Rust analyzer only — Lua plugin excluded (Adobe SDK; no headless LR CI).
# See modules/rust/MODULE.md

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: rust
          paths: noclip-analyze
      - uses: dtolnay/rust-toolchain@stable
      - name: Build for CodeQL
        env:
          CARGO_NET_RETRY: 10
        run: cargo build
        working-directory: noclip-analyze
      - uses: github/codeql-action/analyze@v3
